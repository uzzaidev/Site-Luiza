<svg xmlns="http://www.w3.org/2000/svg" width="280" height="178" viewBox="0 0 280 178" fill="none">
  <!-- Ondas com respiro sutil: ~10px entre linhas na mesma faixa; faixa 2 mais baixa para manter vão entre grupos. -->
  <g stroke-linecap="round" stroke-linejoin="round">
    <!-- Faixa 1: vales -->
    <path stroke="#2e7da3" stroke-opacity="0.22" stroke-width="1.2" d="M0 34 Q70 4 140 34 T280 34"/>
    <path stroke="#5ba8c4" stroke-opacity="0.36" stroke-width="1.15" d="M0 45 Q70 10 140 45 T280 45"/>
    <path stroke="#5ba8c4" stroke-opacity="0.28" stroke-width="1.05" d="M0 56 Q70 16 140 56 T280 56"/>
    <path stroke="#5ba8c4" stroke-opacity="0.22" stroke-width="1" d="M0 67 Q70 22 140 67 T280 67"/>
    <!-- Faixa 2: cristas, deslocada 140px -->
    <path stroke="#2e7da3" stroke-opacity="0.2" stroke-width="1.15" d="M-140 136 Q-70 166 0 136 T140 136 T280 136 T420 136"/>
    <path stroke="#5ba8c4" stroke-opacity="0.34" stroke-width="1.1" d="M-140 124 Q-70 154 0 124 T140 124 T280 124 T420 124"/>
    <path stroke="#5ba8c4" stroke-opacity="0.27" stroke-width="1.02" d="M-140 112 Q-70 142 0 112 T140 112 T280 112 T420 112"/>
    <path stroke="#5ba8c4" stroke-opacity="0.21" stroke-width="0.95" d="M-140 100 Q-70 130 0 100 T140 100 T280 100 T420 100"/>
  </g>
</svg>
